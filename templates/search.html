<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Qidiruv: {{ query }}</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">
    <div class="container mx-auto p-4">
        <form action="/search" method="get" class="mb-6">
            <input type="text" name="q" value="{{ query }}" placeholder="Kino nomi yoki raqami" class="w-full p-3 border rounded-lg">
        </form>
        {% if movies %}
        <h2 class="text-2xl font-semibold mb-4">"{{ query }}" bo'yicha natijalar:</h2>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            {% for movie in movies %}
            <div class="bg-white rounded-lg shadow p-4">
                <h3 class="text-xl font-semibold">#{{ movie.movie_number }} - {{ movie.title }}</h3>
                <a href="/movie/{{ movie.movie_number }}" class="mt-2 inline-block text-blue-500 hover:underline">Batafsil</a>
            </div>
            {% endfor %}
        </div>
        {% else %}
        <p class="text-gray-600">Hech narsa topilmadi.</p>
        {% endif %}
        <a href="/" class="mt-4 inline-block text-blue-500 hover:underline">← Bosh sahifa</a>
    </div>
</body>
</html>
