<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ movie.title }}</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">
    <div class="container mx-auto p-4 max-w-2xl">
        <div class="bg-white rounded-lg shadow p-6">
            <h1 class="text-3xl font-bold mb-2">#{{ movie.movie_number }} - {{ movie.title }}</h1>
            <p class="text-gray-700 mb-4">{{ movie.description }}</p>
            <p class="text-sm text-gray-500 mb-4">👁 Ko'rishlar: {{ movie.views_count }} | Qo'shilgan: {{ movie.added_at.strftime('%Y-%m-%d') }}</p>
            <a href="{{ watch_url }}" target="_blank" class="inline-block bg-green-500 text-white px-6 py-3 rounded-lg hover:bg-green-600">▶️ Tomosha qilish</a>
            <a href="/" class="ml-4 text-blue-500 hover:underline">← Orqaga</a>
        </div>
    </div>
</body>
</html>
