<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kino Bot</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">
    <div class="container mx-auto p-4">
        <h1 class="text-3xl font-bold mb-6">🎬 Eng so'nggi kinolar</h1>
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
            {% for movie in movies %}
            <div class="bg-white rounded-lg shadow p-4">
                <h2 class="text-xl font-semibold">#{{ movie.movie_number }} - {{ movie.title }}</h2>
                <p class="text-gray-600 mt-2">{{ movie.description[:100] }}{% if movie.description|length > 100 %}...{% endif %}</p>
                <a href="/movie/{{ movie.movie_number }}" class="mt-3 inline-block bg-blue-500 text-white px-4 py-2 rounded hover:bg-blue-600">Batafsil</a>
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
